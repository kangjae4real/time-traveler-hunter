<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Traveler Hunter</title>
    <style>
      :root {
        font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      }

      body {
        margin: 0;
        width: 320px;
        background: #f8fafc;
        color: #111827;
      }

      main {
        padding: 14px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 700;
      }

      p {
        margin: 0 0 12px;
        font-size: 12px;
        line-height: 1.45;
        color: #4b5563;
      }

      .section {
        margin-top: 12px;
      }

      .section-title {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 700;
      }

      .mode-group {
        display: grid;
        gap: 8px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #fff;
      }

      select,
      textarea,
      button {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #fff;
        color: #111827;
        font-size: 12px;
      }

      select {
        height: 34px;
        padding: 0 8px;
      }

      textarea {
        min-height: 56px;
        padding: 8px;
        resize: vertical;
        line-height: 1.4;
      }

      button {
        height: 34px;
        margin-top: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .status {
        display: block;
        margin-top: 8px;
        font-size: 11px;
        color: #6b7280;
      }

      small {
        display: block;
        margin-top: 8px;
        font-size: 11px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>날짜놀이 댓글 필터</h1>
      <p>설정을 바꾸면 저장 후 현재 탭 댓글에 즉시 반영합니다.</p>

      <section class="mode-group" role="radiogroup" aria-label="필터 모드">
        <label>
          <input id="mode-weak" type="radio" name="filter-mode" value="weak" />
          약한 탐색 (오탐 적음)
        </label>

        <label>
          <input id="mode-strong" type="radio" name="filter-mode" value="strong" />
          강한 탐색 (제거 범위 넓음)
        </label>
      </section>

      <section class="section">
        <span class="section-title">출석/손 민감도</span>
        <select id="attendance-sensitivity" aria-label="출석 민감도">
          <option value="low">낮음 (출석류 완화)</option>
          <option value="balanced">보통 (기본)</option>
          <option value="high">높음 (출석/손? 적극 제거)</option>
        </select>
      </section>

      <section class="section">
        <span class="section-title">제외 키워드 (쉼표/줄바꿈)</span>
        <textarea
          id="exclusion-keywords"
          placeholder="예: 발매, 콘서트, 리마스터"
        ></textarea>
      </section>

      <section class="section">
        <span class="section-title">화이트리스트 키워드 (항상 표시)</span>
        <textarea
          id="whitelist-keywords"
          placeholder="예: 내 추억, 인생곡, 나만 들음"
        ></textarea>
      </section>

      <button id="apply-settings" type="button">설정 저장 및 즉시 적용</button>
      <span id="save-status" class="status">준비됨</span>

      <small>적용 대상: youtube.com 댓글 영역</small>
    </main>

    <script type="module" src="popup-script.js"></script>
  </body>
</html>
